spring.application.name=x-rest
server.port=${PORT:8080}

# Banco de Dados (Mantendo suas variáveis do Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Removi o 'database-platform' para o Hibernate 6+ auto-detectar o dialeto correto do Postgres 15/16
# Adicionei esse timeout para evitar que o Spring desista se o Supabase demorar a responder
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5